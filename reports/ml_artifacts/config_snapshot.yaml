# Default Prompt 5 ML infrastructure configuration
random_seed: 42
train_ratio: 0.7
validation_ratio: 0.15
test_ratio: 0.15
missing_policy: "drop_rows"
scaler: "standard"
feature_selection: "all"
top_n_features: 20
variance_threshold: 0.0
correlation_threshold: 0.95
cross_validation_folds: 5
feature_ranking_path: "reports/feature_ranking.csv"
